<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bebby ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:'Press Start 2P', cursive;
}

.window{
width:520px;
max-width:90%;
border:4px solid white;
background:black;
padding:15px;
box-shadow:0 0 15px rgba(255,255,255,.3);
}

.titlebar{
height:35px;
border-bottom:3px solid white;
display:flex;
align-items:center;
padding-left:10px;
margin-bottom:25px;
color:white;
font-size:10px;
}

.content{
text-align:center;
}

.question{
color:white;
font-size:18px;
margin-bottom:40px;
line-height:1.6;
}

.buttons{
position:relative;
height:100px;
}

button{
width:120px;
height:50px;
font-family:'Press Start 2P';
font-size:14px;
cursor:pointer;
border:3px solid white;
}

#yes{
background:white;
color:black;
}

#no{
position:absolute;
left:180px;
background:black;
color:white;
transition:.12s linear;
touch-action:none;
}

#loveScreen{
display:none;
position:fixed;
inset:0;
background:black;
overflow:hidden;
}

#bg{
position:absolute;
inset:0;
overflow:hidden;
}

.rain{
position:absolute;
color:#ff149355;
font-size:24px;
font-weight:bold;
white-space:nowrap;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-120px);
}
to{
transform:translateY(120vh);
}
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

.love{
font-size:64px;
color:#ff1493;
text-shadow:
0 0 10px #ff1493,
0 0 20px #ff1493,
0 0 40px #ff1493,
0 0 80px #ff1493;
}

.heart{
font-size:170px;
animation:pulse 1.4s infinite;
filter:
drop-shadow(0 0 20px #ff1493)
drop-shadow(0 0 50px #ff1493);
}

.name{
margin-top:20px;
font-size:20px;
color:white;
letter-spacing:3px;
}

@keyframes pulse{
50%{
transform:scale(1.12);
}
}

@media(max-width:768px){

.window{
width:90%;
}

.question{
font-size:14px;
}

button{
width:100px;
height:45px;
font-size:12px;
}

.love{
font-size:36px;
}

.heart{
font-size:120px;
}

.name{
font-size:14px;
}

.rain{
font-size:16px;
}

}

</style>
</head>
<body>

<div class="window" id="questionBox">

<div class="titlebar">
Do you love me?
</div>

<div class="content">

<div class="question">
Do you love me? ❤️
</div>

<div class="buttons">

<button id="yes">
Yes
</button>

<button id="no">
No
</button>

</div>

</div>

</div>

<div id="loveScreen">

<div id="bg"></div>

<div class="center">

<div class="love">
LOVE YOU
</div>

<div class="heart">
❤️
</div>

<div class="name">
LOVE YOU BEBBY ❤️
</div>

</div>

</div>

<script>

const noBtn = document.getElementById("no");

function moveNoButton(){

const currentX = noBtn.offsetLeft;
const currentY = noBtn.offsetTop;

const moveX = (Math.random()*120)-60;
const moveY = (Math.random()*80)-40;

let newX = currentX + moveX;
let newY = currentY + moveY;

newX = Math.max(
10,
Math.min(window.innerWidth-140,newX)
);

newY = Math.max(
10,
Math.min(window.innerHeight-80,newY)
);

noBtn.style.left = newX + "px";
noBtn.style.top = newY + "px";

}

noBtn.addEventListener(
"mouseenter",
moveNoButton
);

noBtn.addEventListener(
"touchstart",
(e)=>{
e.preventDefault();
moveNoButton();
}
);

document
.getElementById("yes")
.addEventListener("click",()=>{

document
.getElementById("questionBox")
.style.display="none";

document
.getElementById("loveScreen")
.style.display="block";

});

const bg =
document.getElementById("bg");

for(let i=0;i<140;i++){

const item =
document.createElement("div");

item.className="rain";

item.innerText=
Math.random()>0.5
?
"LOVE YOU"
:
"LOVE YOU BEBBY";

item.style.left=
Math.random()*100+"vw";

item.style.top=
(-Math.random()*120)+"vh";

item.style.animationDuration=
(8+Math.random()*10)+"s";

item.style.animationDelay=
(Math.random()*10)+"s";

bg.appendChild(item);

}

</script>

</body>
</html>
